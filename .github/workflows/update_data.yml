name: Hourly Ship Update

on:
  workflow_dispatch: # זה השורה שיוצרת את הכפתור הידיני

jobs:
  update_db:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run collector
        run: python collector.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add hormuz_ships.db
          git commit -m "Automated DB update" || exit 0
          git push
          
