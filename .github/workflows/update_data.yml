      - name: Commit to Data Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # שמירת הדאטה בצד
          cp hormuz_ships.db /tmp/hormuz_ships.db
          
          # מעבר לענף data ויצירתו מחדש כענף ריק לגמרי (יתום)
          git checkout --orphan data_tmp
          git rm -rf .
          
          # החזרת הקובץ בלבד
          cp /tmp/hormuz_ships.db .
          git add hormuz_ships.db
          git commit -m "Automated data update: $(date)" || exit 0
          
          # דחיפה בכוח לענף data האמיתי
          git push origin data_tmp:data --force
          
