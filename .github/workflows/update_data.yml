name: Hourly Ship Update

on:
  workflow_dispatch: # מאפשר הרצה ידנית בלחיצת כפתור
  schedule:
    - cron: '0 */6 * * *' # ירוץ אוטומטית כל 6 שעות

jobs:
  update_db:
    runs-on: ubuntu-latest
    permissions:
      contents: write # חיוני כדי שהבוט יוכל לכתוב לענף ה-data
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install websocket-client pandas requests

      - name: Run collector
        env:
          AIS_TOKEN: ${{ secrets.AIS_TOKEN }}
        run: python collector.py

      - name: Commit to Data Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # מעבר לענף data (יצירה שלו אם אינו קיים)
          git checkout -B data
          
          # הוספת קובץ ה-Database בלבד
          git add hormuz_ships.db
          
          # ביצוע Commit רק אם יש שינויים
          git commit -m "Automated data update: $(date)" || exit 0
          
          # דחיפה בכוח לענף הנתונים
          git push origin data --force
