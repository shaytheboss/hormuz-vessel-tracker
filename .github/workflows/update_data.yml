name: Hourly Ship Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  update_db:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # מושך את כל ההיסטוריה כדי למנוע בעיות מיזוג

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run collector
        env:
          AIS_TOKEN: ${{ secrets.AIS_TOKEN }}
        run: python collector.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add hormuz_ships.db
          git commit -m "Automated DB update" || exit 0
          # הכוח עובר לבוט: דחיסה בכוח לענף המרכזי
          git push origin main --force
          
