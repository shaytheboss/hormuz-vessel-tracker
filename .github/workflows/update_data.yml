name: Hourly Ship Update
on:
  workflow_dispatch:
jobs:
  update_db:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Final
        run: pip install websocket-client pandas requests
      - name: Run collector
        env:
          AIS_TOKEN: ${{ secrets.AIS_TOKEN }}
        run: python collector.py
      - name: Commit to Data Branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B data
          git add hormuz_ships.db
          git commit -m "Data update" || exit 0
          git push origin data --force
