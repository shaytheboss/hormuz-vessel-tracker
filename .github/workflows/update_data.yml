name: Hourly Ship Update

on:
  workflow_dispatch: # מאפשר הרצה ידנית
  schedule:
    - cron: '0 */6 * * *' # ירוץ אוטומטית כל 6 שעות

jobs:
  update_db:
    runs-on: ubuntu-latest
    permissions: # נותן הרשאת כתיבה לבוט
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run collector
        env:
          AIS_TOKEN: ${{ secrets.AIS_TOKEN }} # מחבר את הסוד שהגדרת ב-Settings
        run: python collector.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add hormuz_ships.db
          git commit -m "Real-time DB update" || exit 0
          git push
          
