name: Hourly Ship Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

jobs:
  update_db:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Run collector
        env:
          AIS_TOKEN: ${{ secrets.AIS_TOKEN }}
        run: python collector.py

      - name: Commit to Data Branch
        run: |
          git config --global user.name "ShipBot"
          git config --global user.email "bot@github.com"
          # יצירת ענף דאטה נפרד אם הוא לא קיים
          git checkout -b data || git checkout data
          git add hormuz_ships.db
          git commit -m "Cumulative update: $(date)" || exit 0
          git push origin data --force
